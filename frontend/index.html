<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Hook - 16 Avatar Animations</title>

  <!-- Socket.IO CDN -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    /* Base styles and futuristic dark theme */
    :root {
      --primary: #0cf;
      --secondary: #8a2be2;
      --accent: #00ff88;
      --dark-bg: #0a0a12;
      --darker-bg: #050508;
      --card-bg: rgba(20, 20, 30, 0.8);
      --text: #e0e0ff;
      --text-muted: #a0a0c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--dark-bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animation containers - all hidden by default */
    .animation-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      display: none;
    }

    /* ===== FIXED USER AVATAR STYLES ===== */
    .user-avatar {
      width: 45px !important;
      height: 45px !important;
      border-radius: 50% !important;
      color: white !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      font-weight: bold !important;
      font-size: 20px !important;
      border: 2px solid var(--accent) !important;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.3) !important;
      overflow: hidden !important;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .user-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.6);
    }

    /* Message user avatar fix */
    .message .user-avatar {
      width: 30px !important;
      height: 30px !important;
      font-size: 14px !important;
      margin-right: 10px !important;
      border-width: 1px !important;
      cursor: default;
    }

    .message .user-avatar:hover {
      transform: none;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    }

    /* ===== FIXED MESSAGE CONTAINER - PROPER SPACING ===== */
    .message-container {
      position: fixed;
      top: 100px;
      bottom: 80px;
      left: 0;
      right: 0;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* FIXED: Message styling with proper gap */
    .message {
      margin-bottom: 16px !important;
      animation: messageSlide 0.3s ease-out;
      display: flex;
      align-items: flex-start;
    }

    .message:last-child {
      margin-bottom: 0 !important;
    }

    .message.own {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 20px;
      position: relative;
      backdrop-filter: blur(10px);
    }

    .message.other .message-bubble {
      background: rgba(30, 30, 50, 0.7);
      border: 1px solid rgba(100, 100, 255, 0.2);
      border-bottom-left-radius: 5px;
    }

    .message.own .message-bubble {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-bottom-right-radius: 5px;
      box-shadow: 0 5px 15px rgba(0, 204, 255, 0.3);
    }

    .message-user {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .message .user-avatar {
      width: 30px !important;
      height: 30px !important;
      border-radius: 50% !important;
      border: 2px solid var(--primary) !important;
      color: white !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      font-size: 14px !important;
      font-weight: bold !important;
    }

    .user-name {
      font-weight: bold;
      font-size: 14px;
    }

    .message.own .user-name {
      color: var(--accent);
    }

    .message-content {
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message-meta {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== FIXED SEND CONTAINER ===== */
    #send-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 10, 20, 0.95);
      backdrop-filter: blur(15px);
      padding: 15px 20px;
      border-top: 1px solid rgba(0, 204, 255, 0.2);
      box-sizing: border-box;
      z-index: 100;
      box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.5);
    }

    #messageInp {
      flex: 1;
      max-width: 800px;
      border: none;
      height: 45px;
      border-radius: 25px;
      padding: 0 20px;
      background: rgba(30, 30, 50, 0.9);
      color: var(--text);
      font-size: 15px;
      outline: none;
      border: 1px solid rgba(100, 100, 255, 0.2);
      transition: all 0.3s ease;
    }

    #messageInp:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
      background: rgba(40, 40, 60, 0.95);
    }

    .btn {
      cursor: pointer;
      border: none;
      height: 45px;
      padding: 0 25px;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px rgba(0, 204, 255, 0.4);
    }

    /* Animation Selector Button */
    .animation-selector-container {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1000;
    }

    .animation-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .animation-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px rgba(0, 204, 255, 0.4);
    }

    /* Comedy Club Button */
    .comedy-club-container {
      position: fixed;
      top: 70px;
      left: 15px;
      z-index: 1000;
    }

    .comedy-btn {
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .comedy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px rgba(0, 255, 136, 0.4);
    }

    /* Logo Container */
    .logo-container {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      text-align: center;
      width: auto;
      pointer-events: none;
    }

    .big-logo {
      font-size: 28px;
      font-weight: bold;
      color: #0cf;
      text-shadow: 0 0 15px #0cf, 0 0 30px #8a2be2;
      background: transparent;
      line-height: 1.2;
      text-align: center;
    }

    .big-logo div {
      font-size: 10px;
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent);
      margin-top: 3px;
    }

    /* User Avatar fixed position */
    #userAvatar {
      position: fixed;
      top: 15px;
      right: 20px;
      z-index: 1000;
    }

    /* Join Modal */
    .join-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 10, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(10px);
    }

    .join-card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(0, 204, 255, 0.2);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .join-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
    }

    .join-card h2 {
      margin: 0 0 20px 0;
      text-align: center;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 28px;
    }

    .join-card input, .join-card select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid rgba(100, 100, 255, 0.3);
      border-radius: 8px;
      background: rgba(30, 30, 50, 0.7);
      color: var(--text);
      font-size: 14px;
    }

    .join-card input:focus, .join-card select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
    }

    .join-card button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .join-card button:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px rgba(0, 204, 255, 0.4);
    }

    /* Profile Modal */
    .profile-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 10, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
      backdrop-filter: blur(10px);
    }

    .profile-card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      color: var(--text);
      border: 1px solid rgba(0, 204, 255, 0.2);
      position: relative;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .profile-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      color: white;
      border: 2px solid var(--accent);
    }

    .profile-info h3 {
      margin: 0;
      font-size: 20px;
    }

    .profile-info p {
      margin: 5px 0 0;
      font-size: 12px;
      opacity: 0.7;
    }

    .profile-section {
      margin: 20px 0;
      padding: 15px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
    }

    .profile-section h4 {
      margin: 0 0 10px 0;
      color: var(--accent);
      font-size: 14px;
    }

    .name-change-area {
      display: flex;
      gap: 10px;
    }

    .name-change-area input {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(100,100,255,0.3);
      border-radius: 8px;
      background: rgba(30,30,50,0.7);
      color: var(--text);
    }

    /* Avatar Grid - 16 Animations */
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 15px 0;
    }

    .avatar-option {
      aspect-ratio: 1;
      border-radius: 12px;
      background: rgba(30,30,50,0.7);
      border: 2px solid rgba(100,100,255,0.3);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .avatar-option:hover {
      transform: scale(1.05);
      border-color: var(--primary);
      box-shadow: 0 0 15px var(--primary);
    }

    .avatar-option.selected {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent);
    }

    /* 16 Avatar Animation Styles */
    .avatar-gradient { background: linear-gradient(135deg, #ff0080, #8000ff); animation: gradientShift 3s infinite alternate; }
    @keyframes gradientShift { 0% { background: linear-gradient(135deg, #ff0080, #8000ff); } 100% { background: linear-gradient(135deg, #8000ff, #ff0080); } }
    
    .avatar-neon { background: #0cf; box-shadow: 0 0 10px #0cf; animation: neonPulse 1.5s infinite alternate; }
    @keyframes neonPulse { 0% { box-shadow: 0 0 5px #0cf; } 100% { box-shadow: 0 0 20px #0cf; } }
    
    .avatar-spin { background: conic-gradient(from 0deg, #ff6b6b, #feca57, #48dbfb, #ff6b6b); animation: spin 3s infinite linear; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .avatar-wave { background: linear-gradient(45deg, #0cf, #8a2be2, #00ff88); background-size: 200% 200%; animation: wave 3s infinite; }
    @keyframes wave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    
    .avatar-glitch { background: black; color: #0cf; font-size: 20px; display: flex; align-items: center; justify-content: center; animation: glitchAvatar 2s infinite; }
    .avatar-glitch::before { content: "⚡"; animation: glitch1 2s infinite; }
    @keyframes glitch1 { 0%,100% { transform: translate(0,0); color: #0cf; } 25% { transform: translate(-2px,-2px); color: #f0f; } 50% { transform: translate(2px,2px); color: #0ff; } }
    
    .avatar-hologram { background: linear-gradient(45deg, #00ff88, #0cf, #8a2be2); animation: hologram 4s infinite; }
    @keyframes hologram { 0%,100% { opacity: 0.7; filter: blur(1px); } 50% { opacity: 1; filter: blur(2px); } }
    
    .avatar-liquid { background: radial-gradient(circle at 30% 30%, #bdc3c7, #2c3e50); animation: liquidMorph 5s infinite; }
    @keyframes liquidMorph { 0%,100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; } 50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; } }
    
    .avatar-fire { background: radial-gradient(circle, #ff9a00, #ff6b00); animation: fire 2s infinite alternate; }
    @keyframes fire { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
    
    .avatar-matrix { background: #000; color: #0f0; font-family: monospace; font-size: 24px; display: flex; align-items: center; justify-content: center; animation: matrixText 1s infinite; }
    @keyframes matrixText { 0% { content: "0"; } 50% { content: "1"; } 100% { content: "0"; } }
    
    .avatar-aurora { background: linear-gradient(45deg, #0f2027, #203a43, #2c5364); position: relative; overflow: hidden; }
    .avatar-aurora::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent 30%, rgba(0,255,136,0.3) 50%, transparent 70%); animation: auroraMove 5s infinite linear; }
    @keyframes auroraMove { 0% { transform: translateX(-30%) translateY(-30%); } 100% { transform: translateX(30%) translateY(30%); } }
    
    .avatar-quantum { background: radial-gradient(circle at 30% 30%, #0cf, #8a2be2); animation: quantum 3s infinite; }
    @keyframes quantum { 0%,100% { transform: scale(1); } 50% { transform: scale(0.8); } }
    
    .avatar-cyber { background: linear-gradient(45deg, #000428, #004e92); color: #0cf; font-size: 20px; display: flex; align-items: center; justify-content: center; animation: cyberPulse 1.5s infinite; }
    @keyframes cyberPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    .avatar-crystal { background: linear-gradient(135deg, #00ff88, #0cf); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); animation: crystalSpin 6s infinite linear; }
    @keyframes crystalSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .avatar-bubble { background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 70%); border: 1px solid rgba(255,255,255,0.5); animation: bubbleFloat 4s infinite; }
    @keyframes bubbleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    
    .avatar-galaxy { background: radial-gradient(circle at 20% 20%, #ff6b6b, #8a2be2, #0cf); animation: galaxySpin 10s infinite linear; }
    @keyframes galaxySpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
    
    .avatar-lightning { background: #000; color: #ff0; font-size: 24px; display: flex; align-items: center; justify-content: center; animation: lightning 2s infinite; }
    @keyframes lightning { 0%,95%,98% { opacity: 0.3; } 96%,99% { opacity: 1; } }

    .close-profile-btn {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid rgba(100,100,255,0.3);
      padding: 10px;
      border-radius: 20px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .close-profile-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Comedy Modal */
    .comedy-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 10, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .comedy-card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      border: 1px solid rgba(0, 204, 255, 0.2);
    }

    .joke-display {
      font-size: 16px;
      margin: 15px 0;
      min-height: 70px;
      background: rgba(30, 30, 50, 0.5);
      padding: 15px;
      border-radius: 12px;
    }

    .comedy-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .comedy-controls button {
      padding: 10px 16px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .new-joke-btn { background: linear-gradient(135deg, var(--accent), #00a8cc); color: white; }
    .share-joke-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .close-comedy-btn { background: rgba(255,255,255,0.1); color: var(--text); }

    .add-joke-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(100, 100, 255, 0.2);
    }

    .add-joke-input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      background: rgba(30, 30, 50, 0.7);
      color: var(--text);
      border: 1px solid rgba(100, 100, 255, 0.3);
      margin: 8px 0;
    }

    .submit-joke-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 18px;
      cursor: pointer;
    }

    .confirmation-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 255, 136, 0.9);
      color: #0a0a12;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: bold;
      z-index: 4000;
      animation: confirmPulse 0.5s ease-in-out;
    }

    @keyframes confirmPulse {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    .connection-status {
      position: fixed;
      bottom: 100px;
      right: 20px;
      font-size: 12px;
      background: rgba(0,0,0,0.3);
      padding: 5px 10px;
      border-radius: 20px;
    }

    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      opacity: 0.1;
      animation: float 20s infinite linear;
    }

    .shape:nth-child(1) { width: 80px; height: 80px; background: var(--primary); top: 10%; left: 5%; border-radius: 50%; }
    .shape:nth-child(2) { width: 120px; height: 120px; background: var(--secondary); top: 70%; left: 80%; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
    .shape:nth-child(3) { width: 100px; height: 100px; background: var(--accent); top: 20%; left: 85%; transform: rotate(45deg); }
    .shape:nth-child(4) { width: 150px; height: 150px; background: var(--primary); top: 80%; left: 10%; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }

    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -50px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(30, 30, 50, 0.5); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary), var(--secondary)); border-radius: 10px; }
  </style>
</head>
<body>
  <!-- Floating shapes background -->
  <div class="floating-shapes" id="default-animation">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <!-- Animation Selector Button -->
  <div class="animation-selector-container">
    <button class="animation-btn" onclick="openAnimationSelector()">✨ Change Animation</button>
  </div>

  <!-- Comedy Club Button -->
  <div class="comedy-club-container">
    <button class="comedy-btn" onclick="openComedyClub()">😂 Comedy Club</button>
  </div>

  <!-- User Avatar - CLICKABLE for Profile -->
  <div class="user-avatar" id="userAvatar" onclick="openProfileModal()"></div>

  <!-- Logo -->
  <div class="logo-container">
    <div class="big-logo">
      CHAT<br>HOOK
      <div>Where Every Chat Matters</div>
    </div>
  </div>

  <!-- Message container -->
  <div class="message-container" id="message-container"></div>

  <!-- Connection status -->
  <div class="connection-status">
    <span>🟢 Connected</span>
  </div>

  <!-- Message input form -->
  <form id="send-container">
    <input type="text" name="messageInp" id="messageInp" placeholder="Type your message..." autocomplete="off" />
    <button class="btn" type="submit">Send</button>
  </form>

  <!-- Comedy Club Modal -->
  <div id="comedy-modal" class="comedy-modal">
    <div class="comedy-card">
      <h2>🎭 Comedy Club</h2>
      <div class="joke-display" id="joke-display">Click "New Joke" to start laughing!</div>
      <div class="comedy-controls">
        <button class="new-joke-btn" onclick="getNewJoke()">🎪 New Joke</button>
        <button class="share-joke-btn" onclick="shareJokeToChat()">📢 Share in Chat</button>
        <button class="close-comedy-btn" onclick="closeComedyClub()">✕ Close</button>
      </div>
      <div class="add-joke-section">
        <h4>Add Your Own Joke</h4>
        <input type="text" class="add-joke-input" id="new-joke-input" placeholder="Write a funny joke...">
        <button class="submit-joke-btn" onclick="addNewJoke()">Submit Joke</button>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profile-modal" class="profile-modal">
    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar-display">U</div>
        <div class="profile-info">
          <h3 id="profile-name">User</h3>
          <p id="profile-region">Region</p>
        </div>
      </div>

      <div class="profile-section">
        <h4>✏️ Change Name</h4>
        <div class="name-change-area">
          <input type="text" id="new-name-input" placeholder="Enter new name" maxlength="20">
          <button class="btn" onclick="changeName()" style="padding: 10px 15px;">Change</button>
        </div>
      </div>

      <div class="profile-section">
        <h4>🖼️ Change Profile Picture (16 Animations)</h4>
        <div class="avatar-grid" id="avatar-grid"></div>
      </div>

      <button class="close-profile-btn" onclick="closeProfileModal()">Close</button>
    </div>
  </div>

  <!-- Join Modal -->
  <div id="join-modal" class="join-modal">
    <div class="join-card">
      <h2>Join Chat Hook</h2>
      <form id="join-form">
        <input id="join-name" type="text" placeholder="Your name" required autocomplete="off" />
        <select id="join-gender" required>
          <option value="">Select gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
        <select id="join-region" required>
          <option value="">Select Country / Region</option>
          <option value="Afghanistan">Afghanistan</option><option value="India">India</option><option value="USA">USA</option>
          <option value="United Kingdom">United Kingdom</option><option value="Canada">Canada</option><option value="Australia">Australia</option>
          <option value="Germany">Germany</option><option value="France">France</option><option value="Japan">Japan</option>
          <option value="China">China</option><option value="Brazil">Brazil</option><option value="Russia">Russia</option>
          <option value="South Africa">South Africa</option><option value="Egypt">Egypt</option><option value="Pakistan">Pakistan</option>
          <option value="Bangladesh">Bangladesh</option><option value="Nepal">Nepal</option><option value="Sri Lanka">Sri Lanka</option>
          <option value="UAE">UAE</option><option value="Saudi Arabia">Saudi Arabia</option>
        </select>
        <button type="submit">Join Chat</button>
      </form>
    </div>
  </div>

  <!-- Animation Modal (simplified) -->
  <div id="animation-modal" class="comedy-modal" style="display: none;">
    <div class="comedy-card">
      <h2>✨ Background Animation</h2>
      <p>Coming soon! More animations in next update.</p>
      <button class="close-comedy-btn" onclick="closeAnimationSelector()" style="margin-top: 15px;">Close</button>
    </div>
  </div>

  <script>
    // ======================== LOCALSTORAGE LOGIN SYSTEM ========================
    let socket;
    try {
      socket = io("https://chat-hook-1.onrender.com", {
        transports: ["websocket", "polling"]
      });
    } catch (error) {
      socket = { emit: function() { }, on: function() { } };
    }

    // DOM elements
    const joinModal = document.getElementById('join-modal');
    const joinForm = document.getElementById('join-form');
    const joinName = document.getElementById('join-name');
    const joinGender = document.getElementById('join-gender');
    const joinRegion = document.getElementById('join-region');
    const sendContainer = document.getElementById('send-container');
    const messageInput = document.getElementById('messageInp');
    const messageContainer = document.getElementById('message-container');
    const userAvatar = document.getElementById('userAvatar');

    let currentUser = { name: '', gender: '', region: '', avatarStyle: 'avatar-gradient' };
    let currentJoke = '';
    let jokeCount = 0;
    let jokesDatabase = [
      "Why don't scientists trust atoms? Because they make up everything!",
      "Why did the scarecrow win an award? He was outstanding in his field!",
      "Why don't eggs tell jokes? They'd crack each other up!",
      "What do you call a fake noodle? An impasta!",
      "Why did the math book look so sad? Because it had too many problems!"
    ];

    // Helper functions
    function appendSystemMessage(message) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message';
      msgDiv.innerHTML = `<div style="text-align: center; width: 100%;"><div style="display: inline-block; background: rgba(100, 100, 255, 0.2); color: var(--text-muted); padding: 6px 12px; border-radius: 12px; font-size: 12px;">${message}</div></div>`;
      messageContainer.appendChild(msgDiv);
      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function appendMessage(message, userData, isOwn = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isOwn ? 'own' : 'other'}`;
      const initial = userData.name ? userData.name.charAt(0).toUpperCase() : '?';
      const avatarClass = userData.avatarStyle || 'avatar-gradient';
      msgDiv.innerHTML = `
        <div class="message-bubble">
          <div class="message-user">
            <div class="user-avatar ${avatarClass}" style="display: flex; align-items: center; justify-content: center;">${initial}</div>
            <div class="user-name">${userData.name || 'Unknown'}</div>
          </div>
          <div class="message-content">${escapeHtml(message)}</div>
          <div class="message-meta">
            <span>${userData.gender || 'Unknown'} • ${userData.region || 'Unknown'}</span>
            <span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
          </div>
        </div>
      `;
      messageContainer.appendChild(msgDiv);
      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showConfirmationMessage(msg) {
      const div = document.createElement('div');
      div.className = 'confirmation-message';
      div.textContent = msg;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2000);
    }

    // Join function - saves to localStorage
    function joinChat() {
      const name = joinName.value.trim();
      const gender = joinGender.value;
      const region = joinRegion.value;
      if (!name || !gender || !region) {
        alert('Please fill all fields');
        return;
      }

      // Save to localStorage
      localStorage.setItem('chatHook_username', name);
      localStorage.setItem('chatHook_gender', gender);
      localStorage.setItem('chatHook_region', region);
      localStorage.setItem('chatHook_avatarStyle', 'avatar-gradient');

      currentUser = { name, gender, region, avatarStyle: 'avatar-gradient' };

      // Update UI
      userAvatar.textContent = name.charAt(0).toUpperCase();
      userAvatar.className = `user-avatar avatar-gradient`;
      userAvatar.style.display = 'flex';
      joinModal.style.display = 'none';
      sendContainer.style.display = 'flex';

      appendSystemMessage(`✨ Welcome ${name} to Chat Hook! ✨`);
      socket.emit('new-user-joined', currentUser);
    }

    // Logout function
    function logout() {
      localStorage.removeItem('chatHook_username');
      localStorage.removeItem('chatHook_gender');
      localStorage.removeItem('chatHook_region');
      localStorage.removeItem('chatHook_avatarStyle');
      location.reload();
    }

    // Auto-login on page load
    function checkAutoLogin() {
      const savedName = localStorage.getItem('chatHook_username');
      const savedGender = localStorage.getItem('chatHook_gender');
      const savedRegion = localStorage.getItem('chatHook_region');
      const savedAvatar = localStorage.getItem('chatHook_avatarStyle') || 'avatar-gradient';
      
      if (savedName && savedGender && savedRegion) {
        currentUser = { name: savedName, gender: savedGender, region: savedRegion, avatarStyle: savedAvatar };
        userAvatar.textContent = savedName.charAt(0).toUpperCase();
        userAvatar.className = `user-avatar ${savedAvatar}`;
        userAvatar.style.display = 'flex';
        joinModal.style.display = 'none';
        sendContainer.style.display = 'flex';
        appendSystemMessage(`🔁 Auto-login: Welcome back ${savedName}!`);
        socket.emit('new-user-joined', currentUser);
        return true;
      }
      return false;
    }

    // Socket event handlers
    socket.on('user-joined', (user) => { appendSystemMessage(`🎉 ${user.name} joined the chat`); });
    socket.on('receive', (data) => { appendMessage(data.message, data.user, false); });
    socket.on('left', (user) => { appendSystemMessage(`👋 ${user.name} left the chat`); });
    socket.on('connect', () => { console.log('Socket connected'); });
    socket.on('disconnect', () => { appendSystemMessage('⚠️ Disconnected from server'); });

    // Form submit handler
    sendContainer.addEventListener('submit', (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;
      appendMessage(message, currentUser, true);
      socket.emit('send', { message: message, user: currentUser });
      messageInput.value = '';
    });

    // Join form submit
    joinForm.addEventListener('submit', (e) => {
      e.preventDefault();
      joinChat();
    });

    // ======================== COMEDY CLUB FUNCTIONS ========================
    function openComedyClub() { document.getElementById('comedy-modal').style.display = 'flex'; }
    function closeComedyClub() { document.getElementById('comedy-modal').style.display = 'none'; }
    
    function getNewJoke() {
      if (jokesDatabase.length === 0) return;
      const randomIndex = Math.floor(Math.random() * jokesDatabase.length);
      currentJoke = jokesDatabase[randomIndex];
      document.getElementById('joke-display').textContent = currentJoke;
      jokeCount++;
    }

    function shareJokeToChat() {
      if (currentJoke && socket && currentUser.name) {
        const jokeMsg = `😂 Comedy Club Joke: ${currentJoke}`;
        appendMessage(jokeMsg, currentUser, true);
        socket.emit('send', { message: jokeMsg, user: currentUser });
        closeComedyClub();
      } else if (!currentUser.name) {
        alert("Please join the chat first to share jokes!");
      }
    }

    function addNewJoke() {
      const newJokeInput = document.getElementById('new-joke-input');
      const newJoke = newJokeInput.value.trim();
      if (newJoke) {
        jokesDatabase.push(newJoke);
        newJokeInput.value = '';
        currentJoke = newJoke;
        document.getElementById('joke-display').textContent = currentJoke;
        appendSystemMessage(`📝 You added a new joke to the Comedy Club!`);
      }
    }

    // ======================== PROFILE MODAL FUNCTIONS ========================
    function openProfileModal() {
      if (!currentUser.name) { alert('Please join the chat first!'); return; }
      document.getElementById('profile-modal').style.display = 'flex';
      document.getElementById('profile-name').textContent = currentUser.name;
      document.getElementById('profile-region').textContent = currentUser.region || 'Unknown';
      const profileAvatar = document.getElementById('profile-avatar-display');
      profileAvatar.textContent = currentUser.name.charAt(0).toUpperCase();
      profileAvatar.className = `profile-avatar ${currentUser.avatarStyle || 'avatar-gradient'}`;
      generateAvatarGrid();
    }
    
    function closeProfileModal() { document.getElementById('profile-modal').style.display = 'none'; }
    
    function changeName() {
      const newName = document.getElementById('new-name-input').value.trim();
      if (!newName) { alert('Please enter a new name'); return; }
      const oldName = currentUser.name;
      currentUser.name = newName;
      userAvatar.textContent = newName.charAt(0).toUpperCase();
      document.getElementById('profile-name').textContent = newName;
      document.getElementById('profile-avatar-display').textContent = newName.charAt(0).toUpperCase();
      document.getElementById('new-name-input').value = '';
      showConfirmationMessage(`Name changed to ${newName}!`);
      appendSystemMessage(`${oldName} changed their name to ${newName}`);
      socket.emit('name-changed', { oldName, newName, user: currentUser });
      localStorage.setItem('chatHook_username', newName);
    }
    
    function generateAvatarGrid() {
      const grid = document.getElementById('avatar-grid');
      grid.innerHTML = '';
      const avatars = [
        { class: 'avatar-gradient', name: 'Gradient Flow' },
        { class: 'avatar-neon', name: 'Neon Pulse' },
        { class: 'avatar-spin', name: 'Cosmic Spin' },
        { class: 'avatar-wave', name: 'Rainbow Wave' },
        { class: 'avatar-glitch', name: 'Glitch Effect' },
        { class: 'avatar-hologram', name: 'Hologram' },
        { class: 'avatar-liquid', name: 'Liquid Metal' },
        { class: 'avatar-fire', name: 'Fire Particle' },
        { class: 'avatar-matrix', name: 'Matrix Code' },
        { class: 'avatar-aurora', name: 'Aurora' },
        { class: 'avatar-quantum', name: 'Quantum Ripple' },
        { class: 'avatar-cyber', name: 'Cyber Grid' },
        { class: 'avatar-crystal', name: 'Crystal Shine' },
        { class: 'avatar-bubble', name: 'Bubble Universe' },
        { class: 'avatar-galaxy', name: 'Galaxy Spin' },
        { class: 'avatar-lightning', name: 'Lightning Strike' }
      ];
      avatars.forEach(avatar => {
        const option = document.createElement('div');
        option.className = `avatar-option ${avatar.class}`;
        if (currentUser.avatarStyle === avatar.class) option.classList.add('selected');
        option.setAttribute('data-avatar', avatar.class);
        option.setAttribute('data-name', avatar.name);
        option.onclick = (e) => selectAvatar(avatar.class, e);
        grid.appendChild(option);
      });
    }
    
    function selectAvatar(avatarClass, event) {
      // Update selected state
      document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      
      // Update current user avatar style
      currentUser.avatarStyle = avatarClass;
      
      // Update main user avatar
      userAvatar.className = `user-avatar ${avatarClass}`;
      userAvatar.textContent = currentUser.name.charAt(0).toUpperCase();
      
      // Update profile avatar display
      const profileAvatar = document.getElementById('profile-avatar-display');
      profileAvatar.className = `profile-avatar ${avatarClass}`;
      profileAvatar.textContent = currentUser.name.charAt(0).toUpperCase();
      
      // Save to localStorage
      localStorage.setItem('chatHook_avatarStyle', avatarClass);
      
      const avatarName = event.currentTarget.getAttribute('data-name') || 'Avatar';
      showConfirmationMessage(`${avatarName} avatar applied!`);
      
      // Notify other users about avatar change
      socket.emit('avatar-changed', { user: currentUser, avatarStyle: avatarClass });
    }

    // Animation functions (simplified)
    function openAnimationSelector() { 
      document.getElementById('animation-modal').style.display = 'flex'; 
    }
    function closeAnimationSelector() { 
      document.getElementById('animation-modal').style.display = 'none'; 
    }

    // ======================== INITIALIZATION ========================
    window.onload = () => {
      const autoLogged = checkAutoLogin();
      if (!autoLogged) {
        joinModal.style.display = 'flex';
        sendContainer.style.display = 'none';
      } else {
        sendContainer.style.display = 'flex';
      }
      getNewJoke();
    };
  </script>
</body>
</html>
